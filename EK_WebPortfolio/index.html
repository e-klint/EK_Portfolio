      <section id="contact" class="flx-container center h100vh">
        <div class="wrapper">
          <div class="contrast-box">
            <h3 class="tcolor-parchment t-center">KONTAKT</h3>
            <!-- Kontaktformulär -->
            <form
              action="https://formsubmit.co/f52d5abeb3beb1bf120916e664b85a15"
              method="post"
              class="flx-container center"
            >
              <!-- FormSubmit-inställning som ej ska synas för användaren  -->
              <!-- (aktiverar spam-skydd) -->
              <input type="hidden" name="_captcha" value="true" />
              <!-- (formaterar mailet) -->
              <input type="hidden" name="_template" value="table" />
              <!-- (användaren skickas till tack-sidan) -->
              <input
                type="hidden"
                name="_next"
                value="http://127.0.0.1:5500/thanks.html"
              />
              <div class="form-container flx-container column">
                <!-- Förnamn -->
                <label for="fname">Förnamn:</label>
                <input
                  type="text"
                  id="fname"
                  name="fname"
                  required
                  minlength="2"
                  pattern="[A-Za-zÅÄÖåäö\- ]+"
                  placeholder="Ange ditt förnamn (minst 2 bokstäver)"
                /><!-- Efternamn -->
                <label for="lname">Efternamn:</label>
                <input
                  type="text"
                  id="lname"
                  name="lname"
                  required
                  minlength="2"
                  pattern="[A-Za-zÅÄÖåäö\- ]+"
                  placeholder="Ange ditt efternamn (minst 2 bokstäver)"
                /><!-- E-mail -->
                <!-- Pattern kontrollerar:
          minst ett tecken före @
          minst ett tecken efter @
          minst en punkt i slutet
          Dokumentation: https://developer.mozilla.org/en-US/docs/Web/HTML/Attributes/pattern -->
                <label for="email">E-mail:</label>
                <input
                  type="email"
                  name="email"
                  id="email"
                  required
                  pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$"
                  placeholder="namn@example.com"
                /><!-- Ämne -->
                <label for="topic">Ämne:</label>
                <input type="text" id="topic" name="topic" />
                <!-- Meddelande -->
                <label for="message">Meddelande:</label>
                <textarea
                  name="message"
                  id="message"
                  rows="5"
                  cols="50"
                ></textarea>
                <button type="submit" class="btn send-btn w100">Skicka</button>
              </div>
            </form>
          </div>
        </div>
